<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Reservas | Paulo Morais</title>
    <!-- Preloads -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" as="style">
    <link rel="preload" href="css/style.css" as="style">

    <link rel="shortcut icon" type="image/png" href="images/logo/logo_amarelo_alpha.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .history-page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 180px 20px 100px;
        }

        .back-nav {
            margin-bottom: 40px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--color-primary);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            transform: translateX(-5px);
            opacity: 0.8;
        }

        .history-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .history-grid-modern {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Empty state styling */
        .empty-history {
            text-align: center;
            padding: 100px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-history i {
            width: 50px;
            height: 50px;
            color: var(--color-primary);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .history-page-container {
                padding-top: 150px;
            }
        }
    </style>
    <script src="js/lang.js" defer></script>
    <script src="js/theme.js" defer></script>
</head>

<body class="bg-dark">
    <!-- Header -->
    <header id="header" class="scrolled">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img loading="lazy" src="images/logo/logo_amarelo_alpha.png" width="3563" height="2930" alt="Paulo Morais" style="width: 40px;">
                <span class="logo-text">HISTÓRICO</span>
            </a>
            
            <nav class="nav-menu">
                <a href="perfil.html" class="btn btn-outline" style="padding: 10px 20px;">
                    <i data-lucide="arrow-left"></i> Voltar ao Perfil
                </a>
            </nav>
        </div>
    </header>

    <main class="history-page-container">
        <div class="back-nav">
            <a href="perfil.html" class="btn-back">
                <i data-lucide="chevron-left"></i> Voltar ao Painel
            </a>
        </div>

        <div class="history-header">
            <h1 class="premium-title" id="page-title">Carregando Histórico...</h1>
            <p id="page-subtitle" style="opacity: 0.5; margin-top: 10px;">Consulte o seu histórico de sessões.</p>
        </div>

        <div id="history-content" class="history-grid-modern">
            <div class="text-center" style="padding: 100px; opacity: 0.5;">
                <div class="loader-history">A carregar histórico...</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="padding: 60px 0; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: 50px;">
        <div class="container">
            <p style="opacity: 0.3; font-size: 0.8rem;">&copy; 2026 Paulo Morais - Your Own Workout. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/admin-historico.js"></script>
    <script src="js/script.js" defer></script>
</body>

</html>
